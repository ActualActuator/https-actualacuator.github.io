<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard Drive Collection - Manufacturer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Back to Manufacturers</a>
            <h1 id="manufacturerName">Loading...</h1>
            <p class="subtitle">Drives from this manufacturer</p>
        </header>

        <div class="controls">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search by model, capacity, or type..."
                class="search-bar"
            >
        </div>

        <div id="stats" class="stats-section">
            <div class="stat">
                <span class="stat-label">Drives:</span>
                <span class="stat-value" id="driveCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total Capacity:</span>
                <span class="stat-value" id="totalCapacity">0 TB</span>
            </div>
        </div>

        <div id="drivesContainer" class="drives-grid">
            <p class="loading">Loading drives...</p>
        </div>
    </div>

    <script src="manufacturer-script.js"></script>
</body>
</html>
